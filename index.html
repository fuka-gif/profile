<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>馮の自己紹介</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Mincho ProN", serif;
      background: linear-gradient(120deg, #f5f5dc, #e6d3a3);
      color: #333;
    }

    header {
      background: #3b2f2f;
      color: white;
      padding: 20px;
      text-align: center;
      letter-spacing: 3px;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: rgba(255,255,255,0.8);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      border-bottom: 2px solid #b22222;
      padding-bottom: 5px;
    }

    .profile {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .profile img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #b22222;
      object-fit: cover;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #3b2f2f;
      color: white;
      margin-top: 40px;
    }

    .accent {
      color: #b22222;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <h1>馮のページ</h1>
    <p>和の心を大切に</p>
  </header>

  <div class="container">
    <section class="profile">
      <img src="https://via.placeholder.com/150" alt="プロフィール画像">
      <div>
        <h2>プロフィール</h2>
        <p>名前：<span class="accent">馮</span></p>
        <p>趣味：アニメ / ゲーム / 読書</p>
        <p>ひとこと：自分らしく生きることを大切にしています。</p>
      </div>
    </section>

    <section>
      <h2>好きなもの</h2>
      <ul>
        <li>和風デザイン</li>
        <li>落ち着いた音楽</li>
        <li>美しい風景</li>
      </ul>
    </section>

    <section>
      <h2>メッセージ</h2>
      <p>
        このページをご覧いただきありがとうございます。<br>
        ゆっくりしていってください。
      </p>
    </section>
  </div>

  <footer>
    <p>&copy; 2026 馮</p>
  </footer>

</body>
</html>
